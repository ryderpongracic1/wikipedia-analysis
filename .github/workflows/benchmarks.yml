name: Benchmarks

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC nightly
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:4.4
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
          NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
          NEO4J_dbms_security_procedures_allowlist: "gds.*,apoc.*"
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 30

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for Neo4j to be ready
        run: |
          until python -c "
          from neo4j import GraphDatabase
          d = GraphDatabase.driver('bolt://localhost:7687', auth=('neo4j','testpassword'))
          d.verify_connectivity()
          d.close()
          print('Neo4j ready')
          " 2>/dev/null; do
            echo "Waiting for Neo4j..."
            sleep 3
          done

      - name: Copy sample data
        run: cp wikipedia_analysis/sample-articles.xml tests/fixtures/sample_data.xml 2>/dev/null || true

      - name: Run benchmarks
        run: |
          pytest tests/test_benchmarks.py -m benchmark \
            --timeout=900 \
            -v \
            2>&1 | tee benchmark_output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            benchmarks/results/*.json
            benchmark_output.txt
          retention-days: 90
